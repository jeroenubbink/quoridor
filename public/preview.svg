<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#241008"/>
      <stop offset="100%" stop-color="#0a0402"/>
    </linearGradient>
    <radialGradient id="leftglow" cx="0%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#3a1a08" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a0402" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rp" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ff9999"/>
      <stop offset="100%" stop-color="#cc1111"/>
    </radialGradient>
    <radialGradient id="bp" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#9999ff"/>
      <stop offset="100%" stop-color="#1122cc"/>
    </radialGradient>
    <filter id="bshadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="rgba(0,0,0,0.9)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#leftglow)"/>

  <!-- Divider line -->
  <line x1="60" y1="502" x2="560" y2="502" stroke="#52300a" stroke-width="1.5"/>

  <!-- Logo (favicon geometry scaled 3x) -->
  <g transform="translate(60,70) scale(3)">
    <rect width="32" height="32" rx="3" fill="#b8832a"/>
    <rect x="2"  y="2"  width="8" height="8" fill="#f0d878"/>
    <rect x="12" y="2"  width="8" height="8" fill="#f0d878"/>
    <rect x="22" y="2"  width="8" height="8" fill="#f0d878"/>
    <rect x="2"  y="12" width="8" height="8" fill="#f0d878"/>
    <rect x="12" y="12" width="8" height="8" fill="#f0d878"/>
    <rect x="22" y="12" width="8" height="8" fill="#f0d878"/>
    <rect x="2"  y="22" width="8" height="8" fill="#f0d878"/>
    <rect x="12" y="22" width="8" height="8" fill="#f0d878"/>
    <rect x="22" y="22" width="8" height="8" fill="#f0d878"/>
    <rect x="10" y="2"  width="2" height="18" fill="#1a0804"/>
    <circle cx="26" cy="6"  r="3.5" fill="url(#rp)"/>
    <circle cx="6"  cy="26" r="3.5" fill="url(#bp)"/>
  </g>

  <!-- Title -->
  <text x="60" y="310"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="106" font-weight="bold" letter-spacing="-3"
        fill="#f0d878">Quoridor</text>

  <!-- Subtitle -->
  <text x="60" y="380"
        font-family="Arial, Helvetica, sans-serif"
        font-size="26" fill="#c89060">Strategy board game &#x00B7; No account needed</text>

  <!-- URL -->
  <text x="60" y="565"
        font-family="'Courier New', Courier, monospace"
        font-size="22" fill="#7a5030">quor.blackbyte.nl</text>

  <!-- Board (outer border + surface) -->
