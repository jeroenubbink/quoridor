  <!-- board surface: x=706,y=121,w=388,h=388 -->
  <!-- grid start: x=718,y=133 -->
  <!-- col x: 718 759 800 841 882 923 964 1005 1046 -->
  <!-- row y: 133 174 215 256 297 338 379  420  461  -->
  <g filter="url(#bshadow)">
    <rect x="700" y="115" width="400" height="400" rx="7" fill="#52300a"/>
    <rect x="706" y="121" width="388" height="388" rx="5" fill="#b8832a"/>
  </g>

